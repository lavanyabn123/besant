<html>
    <head>
        <title>
            practice
        </title>
        <style>
            .one{
                height: 400px;
                width: 400px;
                background-color: chartreuse;
                animation-name: hello;
                animation-duration: 4s;
                position: relative;

            }
            @keyframes hello{
            0%{
                top: 0px;
                left: 0px;
            }
            25%{ 
                top: 0px;
                left: 400px; 

            }

            50%{
                
                top: 20px;
                left: 40px; 

            }
            75%{ 
                top: 0px;
                left: 360px; 

            }

            100%{
                top: 0px;
                left:0px
            }

            }
            

        </style>
    </head>
    <body>
        <div class="one"></div>
    </body>
</html>
