<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation</title>
    <style>
        .one{
            height: 400px;
            width: 400px;
            background-color: aqua;
            font-size:  250px;
            text-align: center;
            animation-name: hello;
            animation-duration: 4s;
            position: relative;
        }
       /*  @keyframes hello {
            
        form{background-color: blueviolet;

        }
        to{
            background-color: red;
    } }*/
     @keyframes hello {
        0%{
            top: 0px;
            left: 0px;
        }
        25%{
            top: 0px;
            left: 200px;

        }
        50%{
            top: 200px;
            left: 200px;

        }
        75%{
            top: 200px;
            left: 0px;

        }
        100%{
            top: 0px;
            left:0px;

        }
        
     }
    
    </style>

</head>
<body>
    <div class="one">1</div>
</body>
</html>
